<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceAI Predictor</title>
    <meta name="description" content="Dashboard financeiro estatico com HTML, CSS e JavaScript puro." />
    <link rel="icon" type="image/svg+xml" href="/favicon-finance.svg" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header id="ticker-bar" class="ticker-bar" aria-label="Cotacao de ativos"></header>
      <div class="layout">
        <aside id="sidebar" class="sidebar" aria-label="Navegacao principal"></aside>
        <main id="main-content" class="main-content" aria-live="polite" aria-label="Conteudo principal"></main>
      </div>
    </div>

    <div id="chat-root"></div>
    <div id="toast-container" class="toast-container" aria-live="assertive"></div>

    <noscript>
      <div class="noscript-warning">
        Este projeto precisa de JavaScript habilitado para funcionar.
      </div>
    </noscript>

    <script src="/js/app.js"></script>
  </body>
</html>
